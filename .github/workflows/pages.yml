# Publish a GitHub Pages site via GitHub Actions — GUARDED.
# Serves the root index.html on push to main. Set Settings -> Pages -> Source to
# "GitHub Actions" to activate. No index.html at root -> deploy steps skip (job
# stays green).
name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Is there a site to publish?
        id: site
        run: |
          if [ -f index.html ]; then echo "present=true" >> "$GITHUB_OUTPUT";
          else echo "present=false" >> "$GITHUB_OUTPUT"; echo "No root index.html — skipping."; fi
      - if: steps.site.outputs.present == 'true'
        uses: actions/configure-pages@v5
      - if: steps.site.outputs.present == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        if: steps.site.outputs.present == 'true'
        uses: actions/deploy-pages@v4
