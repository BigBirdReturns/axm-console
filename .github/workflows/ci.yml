# CI runs two layers:
#  - the spoke-independent console core (verify-detached -> receipt -> review
#    queue), which needs only the genesis kernel; and
#  - one real cross-repo drive: axm-embodied is checked out and the
#    camera-frames surface is driven end to end, so the "you can drive a spoke
#    from the seat" claim is actually covered, not merely proven off-CI.
# The other spoke drivers (ScreenGhost, axm-core) still skip cleanly here; a full
# workspace exercises all five.
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: axm-console

      # The genesis kernel is the console's only dependency (the shared trust
      # root). Pinned to the v1.0.0 release commit the whole ecosystem uses.
      - uses: actions/checkout@v4
        with:
          repository: BigBirdReturns/axm-genesis
          ref: 9074e7fb2e9cedde692b248cdd0c6a805e77d8ac
          path: axm-genesis

      # One spoke, checked out so a real drive runs in CI (pure Python, no
      # browser). AXM_EMBODIED_REPO points the camera-frames driver at it.
      - uses: actions/checkout@v4
        with:
          repository: BigBirdReturns/axm-embodied
          path: axm-embodied

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install kernel and console
        run: |
          python -m pip install --upgrade pip
          pip install './axm-genesis[mldsa-compat]'
          pip install -e './axm-console' --no-deps
          pip install pytest

      - name: Tests (core + one real cross-repo drive)
        working-directory: axm-console
        env:
          AXM_EMBODIED_REPO: ${{ github.workspace }}/axm-embodied
        run: python -m pytest tests/ -q
